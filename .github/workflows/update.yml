name: Update events

on:
  schedule:
    # 05:00 UTC = 07:00 CEST — naponta egyszer
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Fetch events
        run: npm run fetch

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- docs/events.json data/geocode-cache.json data/raw-events.json; then
            git add docs/events.json data/geocode-cache.json data/raw-events.json
            git commit -m "Automatikus esemény-frissítés"
            git push
          else
            echo "Nincs változás."
          fi
