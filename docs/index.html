<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUP túrák | Magyar szervezésű evezős túrák egy helyen</title>
<meta name="description" content="Magyar szervezésű SUP túrák gyűjtőoldala — hogy ne maradj le semmiről!">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #f6f9fb;
    --card-bg: #ffffff;
    --text: #16232c;
    --muted: #5b6b76;
    --accent: #0e7c86;
    --accent-2: #e4633f;
    --border: #e1e8ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1618;
      --card-bg: #172225;
      --text: #e8f0f2;
      --muted: #9fb0b8;
      --accent: #3fc4c9;
      --accent-2: #ff8b63;
      --border: #263338;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 2.5rem 1.25rem 1.5rem;
    max-width: 780px;
    margin: 0 auto;
  }
  header h1 {
    margin: 0 0 0.4rem;
    font-size: 1.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  header p {
    color: var(--muted);
    margin: 0;
    max-width: 60ch;
  }
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 1.25rem 3rem;
  }
  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin: 1.2rem 0 1.6rem;
  }
  select, input[type="search"] {
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  .toggle-past {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    color: var(--muted);
    margin: -0.6rem 0 1.4rem;
    cursor: pointer;
    width: fit-content;
  }
  .toggle-past input {
    accent-color: var(--accent);
  }
  .map-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  #map {
    height: 340px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 1.6rem;
    background: var(--card-bg);
  }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--card-bg);
    color: var(--text);
  }
  .map-popup a {
    color: var(--accent);
  }
  .month-group {
    margin-bottom: 1.8rem;
  }
  .month-group h2 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.4rem;
    margin: 0 0 0.8rem;
  }
  .event-card {
    display: flex;
    gap: 1rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.7rem;
    text-decoration: none;
    color: inherit;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }
  .event-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .event-date {
    flex: 0 0 3.6rem;
    text-align: center;
  }
  .event-date .day {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .event-date .dow {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
  }
  .event-body { flex: 1; min-width: 0; }
  .event-body h3 {
    margin: 0 0 0.25rem;
    font-size: 1.05rem;
  }
  .event-meta {
    font-size: 0.87rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.1rem 0.6rem;
  }
  .event-meta .organizer {
    color: var(--accent-2);
    font-weight: 600;
  }
  .weather-badge {
    display: flex;
    flex-wrap: wrap;
    gap: 0.1rem 0.7rem;
    font-size: 0.85rem;
    margin-top: 0.35rem;
    padding-top: 0.35rem;
    border-top: 1px dashed var(--border);
    color: var(--text);
  }
  .weather-badge .rain-high {
    color: var(--accent-2);
    font-weight: 600;
  }
  footer {
    max-width: 780px;
    margin: 0 auto;
    padding: 1rem 1.25rem 3rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .empty, .loading {
    color: var(--muted);
    padding: 2rem 0;
  }
  a.src-link {
    color: var(--accent);
  }
  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.4rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: none;
    border: none;
    font: inherit;
    font-size: 0.95rem;
    color: var(--muted);
    padding: 0.6rem 0.9rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .report-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 1.4rem;
  }
  .report-card h3 {
    margin: 0 0 0.15rem;
    font-size: 1.1rem;
  }
  .report-date {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }
  .report-text p {
    margin: 0 0 0.7rem;
  }
  .report-text p:last-child {
    margin-bottom: 0;
  }
  .report-images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 0.5rem;
    margin: 0.8rem 0;
  }
  .report-images a {
    display: block;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .report-images img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
<header>
  <h1>🏄 SUP túrák</h1>
  <p>Magyar szervezésű SUP túrák egy helyen, hogy ne csak a fényképest beszámolókat lásd. Az oldal automatikusan figyeli a szervezők Facebook-oldalait és honlapjait.</p>
</header>
<main>
  <div class="tabs">
    <button type="button" class="tab-btn active" id="tabTours">Túrák</button>
    <button type="button" class="tab-btn" id="tabReports" style="display:none">Túrabeszámolók</button>
  </div>

  <section id="toursSection">
    <div class="controls">
      <select id="organizerFilter">
        <option value="">Összes szervező</option>
      </select>
      <input type="search" id="searchBox" placeholder="Keresés (pl. helyszín, cím)...">
    </div>
    <label class="toggle-past">
      <input type="checkbox" id="showPast">
      Amiről sajnos már lemaradtál
    </label>
    <label class="toggle-past">
      <input type="checkbox" id="showMap" checked>
      Mutasd térképen!
    </label>
    <div id="mapSection">
      <div class="map-controls">
        <label for="mapDateFilter">Ezt a napot tedd a térképre:</label>
        <select id="mapDateFilter">
          <option value="">Minden nap</option>
        </select>
      </div>
      <div id="map"></div>
    </div>
    <div id="eventList" class="loading">Betöltés…</div>
  </section>

  <section id="reportsSection" style="display:none">
    <div id="reportList" class="loading">Betöltés…</div>
  </section>
</main>
<footer id="footer"></footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const HU_DOW = ['V', 'H', 'K', 'Sze', 'Cs', 'P', 'Szo'];
const HU_MONTH = ['január', 'február', 'március', 'április', 'május', 'június',
                   'július', 'augusztus', 'szeptember', 'október', 'november', 'december'];

function parseISO(dateISO) {
  const [y, m, d] = dateISO.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatMonthHeading(dateISO) {
  const d = parseISO(dateISO);
  return `${d.getFullYear()}. ${HU_MONTH[d.getMonth()]}`;
}

const COMPASS_HU = ['É', 'ÉK', 'K', 'DK', 'D', 'DNy', 'Ny', 'ÉNy'];
function windDirectionHu(deg) {
  return COMPASS_HU[Math.round(deg / 45) % 8];
}

function weatherBadgeHtml(weather) {
  if (!weather) return '';
  const rainClass = weather.precipProbability >= 50 ? ' rain-high' : '';
  return `
    <div class="weather-badge">
      <span>🌡️ ${Math.round(weather.tempMin)}–${Math.round(weather.tempMax)}°C</span>
      <span class="${rainClass.trim()}">🌧️ ${Math.round(weather.precipProbability)}%</span>
      <span>💨 ${Math.round(weather.windSpeed)} km/h ${windDirectionHu(weather.windDirection)}</span>
    </div>
  `;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

let map, markersLayer;
let lastFiltered = [];

function initMap() {
  map = L.map('map').setView([47.1, 19.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function formatDateOption(dateISO) {
  const d = parseISO(dateISO);
  return `${HU_MONTH[d.getMonth()].slice(0, 3)}. ${d.getDate()}. (${HU_DOW[d.getDay()]})`;
}

function populateMapDateFilter(filtered) {
  const select = document.getElementById('mapDateFilter');
  const previous = select.value;
  const dates = [...new Set(filtered.map((e) => e.dateISO).filter(Boolean))].sort();

  select.innerHTML = '<option value="">Minden nap</option>';
  for (const dateISO of dates) {
    const opt = document.createElement('option');
    opt.value = dateISO;
    opt.textContent = formatDateOption(dateISO);
    select.appendChild(opt);
  }
  select.value = dates.includes(previous) ? previous : '';
}

function updateMap(filtered) {
  const dateFilter = document.getElementById('mapDateFilter').value;
  const forMap = dateFilter ? filtered.filter((e) => e.dateISO === dateFilter) : filtered;

  markersLayer.clearLayers();
  const withCoords = forMap.filter((e) => e.lat != null && e.lon != null);
  for (const e of withCoords) {
    const popup = `
      <div class="map-popup">
        <strong>${escapeHtml(e.title)}</strong><br>
        ${e.dateISO ? parseISO(e.dateISO).toLocaleDateString('hu-HU') : ''} ${e.timeText || ''}<br>
        ${escapeHtml(e.organizerName)}<br>
        <a href="${e.url}" target="_blank" rel="noopener">Megnyitás Facebookon</a>
      </div>
    `;
    L.marker([e.lat, e.lon]).bindPopup(popup).addTo(markersLayer);
  }
  if (withCoords.length > 0) {
    map.fitBounds(withCoords.map((e) => [e.lat, e.lon]), { padding: [24, 24], maxZoom: 12 });
  } else {
    map.setView([47.1, 19.0], 7);
  }
}

function render(events) {
  const list = document.getElementById('eventList');
  const organizerFilter = document.getElementById('organizerFilter').value;
  const query = document.getElementById('searchBox').value.trim().toLowerCase();
  const showPast = document.getElementById('showPast').checked;
  const todayISO = new Date().toISOString().slice(0, 10);

  const filtered = events.filter((e) => {
    if (!showPast && e.dateISO && e.dateISO < todayISO) return false;
    if (organizerFilter && e.organizerId !== organizerFilter) return false;
    if (query) {
      const hay = `${e.title} ${e.location || ''} ${e.organizerName}`.toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  lastFiltered = filtered;
  populateMapDateFilter(filtered);
  updateMap(filtered);

  if (filtered.length === 0) {
    list.className = 'empty';
    list.textContent = 'Nincs a szűrésnek megfelelő túra.';
    return;
  }

  list.className = '';
  list.innerHTML = '';

  let currentMonth = null;
  let monthEl = null;

  for (const e of filtered) {
    const monthKey = e.dateISO ? e.dateISO.slice(0, 7) : 'ismeretlen';
    if (monthKey !== currentMonth) {
      currentMonth = monthKey;
      const group = document.createElement('div');
      group.className = 'month-group';
      const heading = document.createElement('h2');
      heading.textContent = e.dateISO ? formatMonthHeading(e.dateISO) : 'Dátum nélkül';
      group.appendChild(heading);
      list.appendChild(group);
      monthEl = group;
    }

    const card = document.createElement('a');
    card.className = 'event-card';
    card.href = e.url;
    card.target = '_blank';
    card.rel = 'noopener';

    const dateBox = document.createElement('div');
    dateBox.className = 'event-date';
    if (e.dateISO) {
      const d = parseISO(e.dateISO);
      dateBox.innerHTML = `<div class="day">${d.getDate()}</div><div class="dow">${HU_DOW[d.getDay()]}</div>`;
    }

    const body = document.createElement('div');
    body.className = 'event-body';
    const h3 = document.createElement('h3');
    h3.textContent = e.title;
    const meta = document.createElement('div');
    meta.className = 'event-meta';
    meta.innerHTML = `
      <span class="organizer">${e.organizerName}</span>
      ${e.timeText ? `<span>${e.timeText}</span>` : ''}
      ${e.location ? `<span>${e.location}</span>` : ''}
    `;
    body.appendChild(h3);
    body.appendChild(meta);
    if (e.weather) {
      const weatherEl = document.createElement('div');
      weatherEl.innerHTML = weatherBadgeHtml(e.weather);
      body.appendChild(weatherEl.firstElementChild);
    }

    card.appendChild(dateBox);
    card.appendChild(body);
    monthEl.appendChild(card);
  }
}

function renderReports(reports) {
  const list = document.getElementById('reportList');
  if (reports.length === 0) {
    list.className = 'empty';
    list.textContent = 'Még nincs túrabeszámoló.';
    return;
  }

  list.className = '';
  list.innerHTML = '';

  const sorted = [...reports].sort((a, b) => (b.dateISO || '').localeCompare(a.dateISO || ''));
  for (const r of sorted) {
    const card = document.createElement('div');
    card.className = 'report-card';

    const h3 = document.createElement('h3');
    h3.textContent = r.title;
    card.appendChild(h3);

    if (r.dateISO) {
      const dateEl = document.createElement('div');
      dateEl.className = 'report-date';
      dateEl.textContent = parseISO(r.dateISO).toLocaleDateString('hu-HU');
      card.appendChild(dateEl);
    }

    if (Array.isArray(r.images) && r.images.length > 0) {
      const gallery = document.createElement('div');
      gallery.className = 'report-images';
      for (const src of r.images) {
        const a = document.createElement('a');
        a.href = src;
        a.target = '_blank';
        a.rel = 'noopener';
        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.alt = r.title;
        a.appendChild(img);
        gallery.appendChild(a);
      }
      card.appendChild(gallery);
    }

    if (r.text) {
      const textEl = document.createElement('div');
      textEl.className = 'report-text';
      textEl.innerHTML = r.text.split(/\n\s*\n/).map((p) => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
      card.appendChild(textEl);
    }

    list.appendChild(card);
  }
}

// A "Túrabeszámolók" fül alapból rejtve van a látogatók elől — a
// https://.../?reports=1 linkkel kapcsolható be (ez a böngészőben localStorage-ban
// megjegyződik, úgyhogy elég egyszer megnyitni), ?reports=0 pedig újra elrejti.
function reportsEnabled() {
  const params = new URLSearchParams(location.search);
  if (params.has('reports')) {
    const on = params.get('reports') !== '0';
    localStorage.setItem('reportsEnabled', on ? '1' : '0');
    return on;
  }
  return localStorage.getItem('reportsEnabled') === '1';
}

function initTabs() {
  const tabTours = document.getElementById('tabTours');
  const tabReports = document.getElementById('tabReports');
  const toursSection = document.getElementById('toursSection');
  const reportsSection = document.getElementById('reportsSection');

  tabTours.addEventListener('click', () => {
    tabTours.classList.add('active');
    tabReports.classList.remove('active');
    toursSection.style.display = '';
    reportsSection.style.display = 'none';
    if (document.getElementById('showMap').checked) {
      setTimeout(() => map.invalidateSize(), 0);
    }
  });
  tabReports.addEventListener('click', () => {
    tabReports.classList.add('active');
    tabTours.classList.remove('active');
    reportsSection.style.display = '';
    toursSection.style.display = 'none';
  });
}

async function init() {
  initMap();
  initTabs();

  let data;
  try {
    const res = await fetch('events.json', { cache: 'no-store' });
    data = await res.json();
  } catch (err) {
    document.getElementById('eventList').textContent = 'Nem sikerült betölteni az eseményeket.';
    return;
  }

  if (reportsEnabled()) {
    document.getElementById('tabReports').style.display = '';
    try {
      const reportsRes = await fetch('reports.json', { cache: 'no-store' });
      const reportsData = await reportsRes.json();
      renderReports(reportsData.reports || []);
    } catch (err) {
      document.getElementById('reportList').textContent = 'Nem sikerült betölteni a beszámolókat.';
    }
  }

  const events = data.events || [];
  const organizerSelect = document.getElementById('organizerFilter');
  const organizers = [...new Map(events.map((e) => [e.organizerId, e.organizerName])).entries()];
  for (const [id, name] of organizers) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = name;
    organizerSelect.appendChild(opt);
  }

  organizerSelect.addEventListener('change', () => render(events));
  document.getElementById('searchBox').addEventListener('input', () => render(events));
  document.getElementById('showPast').addEventListener('change', () => render(events));
  document.getElementById('mapDateFilter').addEventListener('change', () => updateMap(lastFiltered));
  document.getElementById('showMap').addEventListener('change', (e) => {
    const mapSection = document.getElementById('mapSection');
    mapSection.style.display = e.target.checked ? '' : 'none';
    if (e.target.checked) {
      setTimeout(() => map.invalidateSize(), 0);
    }
  });

  render(events);

  const footer = document.getElementById('footer');
  if (data.lastUpdated) {
    const updated = new Date(data.lastUpdated);
    footer.textContent = `Utolsó frissítés: ${updated.toLocaleString('hu-HU')}`;
  }
}

init();
</script>
</body>
</html>
